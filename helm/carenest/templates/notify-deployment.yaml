apiVersion: apps/v1
kind: Deployment
metadata:
  name: notify
  namespace: {{ .Values.namespace }}
  labels:
    app: notify
    app.kubernetes.io/name: carenest
spec:
  replicas: {{ .Values.replicas.notify }}
  selector:
    matchLabels:
      app: notify
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: notify
    spec:
      serviceAccountName: carenest-sa
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      initContainers:
        - name: wait-for-mongo
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongo-service {{ .Values.ports.mongo }}; do
                echo "Waiting for MongoDB..."
                sleep 2
              done
              echo "MongoDB is ready!"
      containers:
        - name: notify
          image: {{ .Values.images.notify }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: {{ .Values.ports.notify }}
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: carenest-config
                  key: NOTIFY_PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: carenest-config
                  key: NODE_ENV
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: carenest-secrets
                  key: MONGO_URI_NOTIFY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: carenest-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: {{ .Values.resources.notify.requests.cpu }}
              memory: {{ .Values.resources.notify.requests.memory }}
            limits:
              cpu: {{ .Values.resources.notify.limits.cpu }}
              memory: {{ .Values.resources.notify.limits.memory }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ports.notify }}
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ports.notify }}
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
