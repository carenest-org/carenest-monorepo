apiVersion: v1
kind: ServiceAccount
metadata:
  name: carenest-sa
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: carenest
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: carenest-role
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: carenest
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: carenest-rolebinding
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: carenest
subjects:
  - kind: ServiceAccount
    name: carenest-sa
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: carenest-role
  apiGroup: rbac.authorization.k8s.io
