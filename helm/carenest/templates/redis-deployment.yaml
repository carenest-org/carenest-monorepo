apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ .Values.namespace }}
  labels:
    app: redis
    app.kubernetes.io/name: carenest
spec:
  replicas: {{ .Values.replicas.redis }}
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: redis
          image: {{ .Values.images.redis }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: {{ .Values.ports.redis }}
          resources:
            requests:
              cpu: {{ .Values.resources.redis.requests.cpu }}
              memory: {{ .Values.resources.redis.requests.memory }}
            limits:
              cpu: {{ .Values.resources.redis.limits.cpu }}
              memory: {{ .Values.resources.redis.limits.memory }}
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 15
