apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: {{ .Values.namespace }}
  labels:
    app: frontend
    app.kubernetes.io/name: carenest
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: {{ .Values.ports.frontend }}
      targetPort: {{ .Values.ports.frontend }}
      name: http
