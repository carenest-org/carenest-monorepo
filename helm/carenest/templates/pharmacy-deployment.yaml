apiVersion: apps/v1
kind: Deployment
metadata:
  name: pharmacy
  namespace: {{ .Values.namespace }}
  labels:
    app: pharmacy
    app.kubernetes.io/name: carenest
spec:
  replicas: {{ .Values.replicas.pharmacy }}
  selector:
    matchLabels:
      app: pharmacy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: pharmacy
    spec:
      serviceAccountName: carenest-sa
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      initContainers:
        - name: wait-for-mongo
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongo-service {{ .Values.ports.mongo }}; do
                echo "Waiting for MongoDB..."
                sleep 2
              done
              echo "MongoDB is ready!"
      containers:
        - name: pharmacy
          image: {{ .Values.images.pharmacy }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: {{ .Values.ports.pharmacy }}
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: carenest-config
                  key: PHARMACY_PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: carenest-config
                  key: NODE_ENV
            - name: NOTIFY_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: carenest-config
                  key: NOTIFY_SERVICE_URL
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: carenest-secrets
                  key: MONGO_URI_PHARMACY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: carenest-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: {{ .Values.resources.pharmacy.requests.cpu }}
              memory: {{ .Values.resources.pharmacy.requests.memory }}
            limits:
              cpu: {{ .Values.resources.pharmacy.limits.cpu }}
              memory: {{ .Values.resources.pharmacy.limits.memory }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ports.pharmacy }}
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ports.pharmacy }}
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
