# ──────────────────────────────────────────────────────
# HAProxy Configuration for External EC2 Instance
# ──────────────────────────────────────────────────────
# Deploy this file on your HAProxy EC2 at:
#   /etc/haproxy/haproxy.cfg
#
# Replace WORKER_NODE_1_IP and WORKER_NODE_2_IP with the
# PRIVATE IPs of your Kubernetes worker nodes.
# Run: kubectl get nodes -o wide
#
# NodePort must match gateway.nodePort in values.yaml (default: 30080)
#
# After updating, reload: sudo systemctl reload haproxy
# ──────────────────────────────────────────────────────

global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon
    maxconn 4096

    # Security
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    option  http-server-close

    timeout connect 5s
    timeout client  30s
    timeout server  30s
    timeout http-request 10s
    timeout http-keep-alive 10s
    timeout queue 30s
    timeout check 5s

    retries 3
    retry-on all-retryable-errors

    # Custom error pages (optional)
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# ── Stats Dashboard ──────────────────────────────────
# Access at: http://<HAPROXY_IP>:8404/stats
listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends
    stats show-node
    stats admin if TRUE

# ── Frontend: Accept all HTTP traffic ────────────────
frontend carenest_http
    bind *:80

    # Add useful headers
    http-request set-header X-Forwarded-Port %[dst_port]
    http-request set-header X-Forwarded-Proto http
    http-request add-header X-Real-IP %[src]

    # Rate limiting (optional): 100 req/10s per IP
    stick-table type ip size 100k expire 30s store http_req_rate(10s)
    http-request track-sc0 src
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 100 }

    # Default backend
    default_backend carenest_k8s_gateway

# ── Backend: Kubernetes Envoy Gateway via NodePort ───
backend carenest_k8s_gateway
    balance roundrobin
    option httpchk GET /healthz
    http-check expect status 200

    # Retry on connection failure (failover to other node)
    option redispatch
    retries 3

    # Health check: every 5s, mark down after 3 failures, up after 2 successes
    # ──────────────────────────────────────────────────
    # IMPORTANT: Replace these IPs with your actual worker node PRIVATE IPs
    #
    # Find them with: kubectl get nodes -o wide
    # The NodePort (30080) must match gateway.nodePort in values.yaml
    # ──────────────────────────────────────────────────
    server k8s-worker-1 WORKER_NODE_1_IP:30080 check inter 5s fall 3 rise 2
    server k8s-worker-2 WORKER_NODE_2_IP:30080 check inter 5s fall 3 rise 2
